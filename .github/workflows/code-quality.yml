name: C++ Code Quality

on:
  push:
    branches: ["main", "master"]
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read
  actions: write

jobs:
  clang-format:
    name: Format Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Run clang-format
        uses: jidicula/clang-format-action@3bd9e396c8e2ed8e9d8fba163f6576682189e50a # v4.13.0
        with:
          clang-format-version: '18'
          check-path: 'src'
          fallback-style: 'Google'

  clang-tidy:
    name: Static Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-tidy-18 cmake

      - name: Configure project (generate compile_commands.json)
        run: |
          cmake -S . -B build -DCMAKE_EXPORT_COMPILE_COMMANDS=ON

      - name: Run clang-tidy
        run: |
          find src -name '*.cpp' -o -name '*.h' | xargs clang-tidy-18 -p build --warnings-as-errors=''

  cppcheck:
    name: Cppcheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7

      - name: Run cppcheck
        uses: deep5050/cppcheck-action@c6e2d5e8dd11a34b4ae8e5915b2419a6e323b67c # v1.7.4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          check_dir: src
          enable: all
          exclude_check: missingInclude
          output_file: cppcheck-report.txt
          inline_suppression: true
          force: true

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@0b2256b8c012f0828dc542b3febcab082c67f72b # v4.5.0
        with:
          name: cppcheck-report
          path: cppcheck-report.txt

name: CodeQL

on:
  push:
    branches:
      - master
      - fix/**
  pull_request:
    branches:
      - master
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  CodeQLExpected:
    name: CodeQLExpected
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: cpp
          build-mode: none

      - name: Analyze
        uses: github/codeql-action/analyze@v4
